server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:alumni;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driverClassName: org.h2.Driver
    username: sa
    password: 
  h2:
    console:
      enabled: true
      path: /h2
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

app:
  jwt:
    issuer: "90s-alumni-demo"
    access_token_minutes: 15
    refresh_token_days: 30
    # IMPORTANT: change this in real deployment
    secret: "CHANGE_ME_TO_A_LONG_RANDOM_SECRET_AT_LEAST_64_CHARS__________________________"

logging:
  level:
    org.springframework.security: INFO
