server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:alumni;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driverClassName: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2

app:
  security:
    jwt:
      issuer: "90s-alumni-demo"
      accessTokenTtlMinutes: 15
      refreshTokenTtlDays: 14
      # IMPORTANT: change this in production (must be at least 32 chars)
      secret: "CHANGE_ME_TO_A_LONG_RANDOM_SECRET_32CHARS_MIN"

logging:
  level:
    org.springframework.security: INFO
